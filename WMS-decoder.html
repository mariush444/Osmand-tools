<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS Decoder</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=DM+Sans:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #060a13;
            --bg2: #0b1120;
            --card: #0d1424;
            --border: #1a2740;
            --border-light: #243352;
            --text: #e2e8f0;
            --text-dim: #94a3b8;
            --text-muted: #4a5e7a;
            --accent: #00e5b0;
            --accent-dim: rgba(0,229,176,0.08);
            --accent-mid: rgba(0,229,176,0.25);
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #38bdf8;
            --mono: 'JetBrains Mono', monospace;
            --sans: 'DM Sans', sans-serif;
            --radius: 10px;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
        }
        .bg-grid {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background-image: radial-gradient(circle, rgba(0,229,176,0.035) 1px, transparent 1px);
            background-size: 28px 28px;
        }
        .bg-blob {
            position: fixed; border-radius: 50%; filter: blur(120px); z-index: 0; pointer-events: none;
        }
        .bg-blob-1 {
            width: 600px; height: 600px; top: -200px; left: -100px;
            background: rgba(0,229,176,0.04);
            animation: blobDrift 25s ease-in-out infinite alternate;
        }
        .bg-blob-2 {
            width: 500px; height: 500px; bottom: -150px; right: -100px;
            background: rgba(56,189,248,0.03);
            animation: blobDrift 30s ease-in-out infinite alternate-reverse;
        }
        @keyframes blobDrift {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(60px, 40px) scale(1.1); }
            100% { transform: translate(-30px, 70px) scale(0.95); }
        }
        .container {
            position: relative; z-index: 1;
            max-width: 1080px; margin: 0 auto;
            padding: 48px 24px 80px;
        }
        header { margin-bottom: 36px; }
        .logo { display: flex; align-items: center; gap: 14px; margin-bottom: 8px; }
        .logo-icon {
            width: 44px; height: 44px; border-radius: 12px;
            background: linear-gradient(135deg, var(--accent), #00b894);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; color: #060a13; flex-shrink: 0;
            box-shadow: 0 0 24px rgba(0,229,176,0.2);
        }
        .logo-text {
            font-size: 28px; font-weight: 900; letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--text), var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle { color: var(--text-muted); font-size: 15px; margin-left: 58px; margin-top: -4px; }

        .input-section {
            background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 20px; margin-bottom: 32px;
        }
        .url-row { display: flex; gap: 10px; margin-bottom: 14px; }
        .url-wrap {
            flex: 1; display: flex; align-items: center;
            background: var(--bg2); border: 1px solid var(--border);
            border-radius: 8px; padding: 0 14px; transition: border-color 0.2s;
        }
        .url-wrap:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
        .url-wrap i { color: var(--text-muted); font-size: 14px; margin-right: 10px; flex-shrink: 0; }
        .url-wrap input {
            flex: 1; background: none; border: none; outline: none;
            color: var(--text); font-family: var(--mono); font-size: 13px;
            padding: 12px 0; min-width: 0;
        }
        .url-wrap input::placeholder { color: var(--text-muted); }
        .decode-btn {
            display: flex; align-items: center; gap: 8px;
            padding: 0 24px; border: none; border-radius: 8px;
            background: linear-gradient(135deg, var(--accent), #00b894);
            color: #060a13; font-family: var(--sans); font-weight: 700;
            font-size: 14px; cursor: pointer; white-space: nowrap;
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 2px 16px rgba(0,229,176,0.25);
        }
        .decode-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 24px rgba(0,229,176,0.35); }
        .decode-btn:active { transform: translateY(0); }
        .decode-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .proxy-row { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--text-dim); flex-wrap: wrap; }
        .toggle { position: relative; width: 38px; height: 22px; flex-shrink: 0; }
        .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
        .toggle-track {
            position: absolute; inset: 0; border-radius: 11px;
            background: var(--border); cursor: pointer; transition: background 0.2s;
        }
        .toggle-track::after {
            content: ''; position: absolute; left: 3px; top: 3px;
            width: 16px; height: 16px; border-radius: 50%;
            background: var(--text-muted); transition: transform 0.2s, background 0.2s;
        }
        .toggle input:checked + .toggle-track { background: var(--accent-mid); }
        .toggle input:checked + .toggle-track::after { transform: translateX(16px); background: var(--accent); }

        .proxy-select {
            background: var(--bg2); border: 1px solid var(--border);
            border-radius: 6px; padding: 5px 10px; font-size: 12px;
            color: var(--text-dim); font-family: var(--sans); outline: none;
            cursor: pointer;
        }
        .proxy-select:focus { border-color: var(--accent); }
        .proxy-select option { background: var(--bg2); color: var(--text); }
        .proxy-custom {
            background: var(--bg2); border: 1px solid var(--border);
            border-radius: 6px; padding: 5px 10px; font-size: 12px;
            color: var(--text); font-family: var(--mono); outline: none;
            width: 360px; max-width: 100%;
        }
        .proxy-custom:focus { border-color: var(--accent); }
        .proxy-custom::placeholder { color: var(--text-muted); }
        .proxy-row small { color: var(--text-muted); }

        .loading { text-align: center; padding: 60px 20px; color: var(--text-dim); }
        .spinner {
            width: 40px; height: 40px; margin: 0 auto 16px;
            border: 3px solid var(--border); border-top-color: var(--accent);
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .error-box {
            background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25);
            border-radius: var(--radius); padding: 20px 24px;
            color: #fca5a5; font-size: 14px; line-height: 1.7;
        }
        .error-box i { color: var(--danger); margin-right: 8px; }
        .error-box code {
            background: rgba(239,68,68,0.12); padding: 2px 6px; border-radius: 4px;
            font-family: var(--mono); font-size: 12px; color: #fecaca; word-break: break-all;
        }

        .results { animation: fadeUp 0.4s ease-out; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .service-info {
            background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 20px 24px; margin-bottom: 24px;
        }
        .service-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
        .service-abstract { font-size: 13px; color: var(--text-dim); line-height: 1.6; }
        .service-keywords { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px; }
        .keyword-tag {
            font-size: 11px; padding: 3px 10px; border-radius: 20px;
            background: var(--accent-dim); color: var(--accent);
            border: 1px solid rgba(0,229,176,0.15);
        }

        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
        .stat-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 20px; text-align: center;
            transition: border-color 0.2s;
        }
        .stat-card:hover { border-color: var(--border-light); }
        .stat-value {
            font-size: 28px; font-weight: 900; font-family: var(--mono);
            margin-bottom: 4px; line-height: 1.2;
        }
        .stat-value.version { color: var(--info); }
        .stat-value.count { color: var(--accent); }
        .stat-value.yes { color: var(--success); }
        .stat-value.no { color: var(--danger); }
        .stat-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }

        .info-box {
            background: rgba(56,189,248,0.06); border: 1px solid rgba(56,189,248,0.18);
            border-radius: var(--radius); padding: 18px 22px; margin-bottom: 24px;
            font-size: 13px; color: var(--text-dim); line-height: 1.7;
        }
        .info-box strong { color: var(--text); }
        .info-box code {
            background: rgba(56,189,248,0.1); padding: 1px 6px; border-radius: 4px;
            font-family: var(--mono); font-size: 12px; color: var(--info);
        }
        .warn-box {
            background: rgba(245,158,11,0.06); border: 1px solid rgba(245,158,11,0.2);
            border-radius: var(--radius); padding: 18px 22px; margin-bottom: 24px;
            font-size: 13px; color: var(--text-dim); line-height: 1.7;
        }
        .warn-box strong { color: var(--warning); }
        .warn-box code {
            background: rgba(245,158,11,0.1); padding: 1px 6px; border-radius: 4px;
            font-family: var(--mono); font-size: 12px; color: var(--warning);
        }

        .section {
            background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius); margin-bottom: 24px; overflow: hidden;
        }
        .section-head {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 22px; border-bottom: 1px solid var(--border);
            flex-wrap: wrap; gap: 10px;
        }
        .section-head h2 {
            font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 8px;
        }
        .section-head h2 i { color: var(--accent); font-size: 14px; }
        .section-actions { display: flex; align-items: center; gap: 8px; }
        .search-input {
            background: var(--bg2); border: 1px solid var(--border);
            border-radius: 6px; padding: 6px 12px; font-size: 12px;
            color: var(--text); outline: none; width: 200px; font-family: var(--sans);
            transition: border-color 0.2s;
        }
        .search-input:focus { border-color: var(--accent); }
        .search-input::placeholder { color: var(--text-muted); }
        .btn-sm {
            display: flex; align-items: center; gap: 5px;
            padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border);
            background: var(--bg2); color: var(--text-dim); font-size: 12px;
            font-family: var(--sans); cursor: pointer; transition: all 0.15s;
        }
        .btn-sm:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
        .btn-sm.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
        .chk-label {
            display: flex; align-items: center; gap: 6px; font-size: 12px;
            color: var(--text-dim); cursor: pointer; user-select: none;
        }
        .chk-label input[type="checkbox"] { accent-color: var(--accent); cursor: pointer; }

        .layer-list { max-height: 420px; overflow-y: auto; }
        .layer-list::-webkit-scrollbar { width: 6px; }
        .layer-list::-webkit-scrollbar-track { background: transparent; }
        .layer-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        .layer-item {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 22px; border-bottom: 1px solid rgba(26,39,64,0.5);
            cursor: pointer; transition: background 0.12s; font-size: 13px;
        }
        .layer-item:last-child { border-bottom: none; }
        .layer-item:hover { background: var(--accent-dim); }
        .layer-item .idx {
            min-width: 32px; text-align: right; color: var(--text-muted);
            font-family: var(--mono); font-size: 11px; user-select: none;
        }
        .layer-item .name {
            flex: 1; font-family: var(--mono); font-size: 12.5px;
            color: var(--text); word-break: break-all; min-width: 0;
        }
        .layer-item .group-badge {
            font-size: 10px; padding: 2px 7px; border-radius: 4px;
            background: rgba(245,158,11,0.12); color: var(--warning);
            border: 1px solid rgba(245,158,11,0.2); flex-shrink: 0;
        }
        .layer-item .copy-hint {
            opacity: 0; color: var(--text-muted); font-size: 11px;
            transition: opacity 0.15s; flex-shrink: 0;
        }
        .layer-item:hover .copy-hint { opacity: 1; }
        .layer-empty { padding: 30px; text-align: center; color: var(--text-muted); font-size: 13px; }
        .layer-count-bar {
            padding: 8px 22px; background: var(--bg2); font-size: 11px;
            color: var(--text-muted); border-bottom: 1px solid var(--border);
        }

        .layer-tree { padding: 12px 0; max-height: 500px; overflow-y: auto; }
        .layer-tree::-webkit-scrollbar { width: 6px; }
        .layer-tree::-webkit-scrollbar-track { background: transparent; }
        .layer-tree::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        .tree-row {
            display: flex; align-items: center; gap: 6px;
            padding: 5px 22px; cursor: pointer; transition: background 0.1s;
        }
        .tree-row:hover { background: var(--accent-dim); }
        .tree-toggle {
            width: 18px; height: 18px; display: flex; align-items: center;
            justify-content: center; font-size: 10px; color: var(--text-muted);
            flex-shrink: 0; transition: transform 0.15s;
        }
        .tree-toggle.collapsed { transform: rotate(-90deg); }
        .tree-toggle.hidden-toggle { visibility: hidden; }
        .tree-icon { font-size: 13px; flex-shrink: 0; }
        .tree-icon.folder { color: var(--warning); }
        .tree-icon.leaf { color: var(--accent); }
        .tree-name {
            font-family: var(--mono); font-size: 12px; color: var(--text);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .tree-name.folder-name { color: var(--text-dim); font-family: var(--sans); font-weight: 600; font-size: 13px; }
        .tree-children { overflow: hidden; }
        .tree-children.collapsed { display: none; }

        .crs-list { padding: 12px 0; }
        .crs-item {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 22px; transition: background 0.1s;
        }
        .crs-item:hover { background: var(--accent-dim); }
        .crs-badge {
            font-family: var(--mono); font-size: 12px; padding: 3px 10px;
            border-radius: 5px; font-weight: 600; flex-shrink: 0;
        }
        .crs-badge.highlight {
            background: var(--accent-dim); color: var(--accent);
            border: 1px solid rgba(0,229,176,0.2);
        }
        .crs-badge.normal {
            background: var(--bg2); color: var(--text-dim);
            border: 1px solid var(--border);
        }
        .crs-desc { font-size: 12px; color: var(--text-muted); }

        .raw-xml {
            margin: 0; padding: 16px 22px; font-family: var(--mono);
            font-size: 11.5px; line-height: 1.6; color: var(--text-dim);
            max-height: 500px; overflow: auto; white-space: pre-wrap;
            word-break: break-all; background: var(--bg2);
        }
        .raw-xml::-webkit-scrollbar { width: 6px; }
        .raw-xml::-webkit-scrollbar-track { background: transparent; }
        .raw-xml::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        #toastBox {
            position: fixed; bottom: 24px; right: 24px; z-index: 9999;
            display: flex; flex-direction: column; gap: 8px; pointer-events: none;
        }
        .toast {
            padding: 10px 18px; border-radius: 8px; font-size: 13px;
            font-family: var(--sans); color: var(--text);
            background: var(--card); border: 1px solid var(--border);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            transform: translateX(120%); transition: transform 0.3s ease;
            pointer-events: auto; max-width: 380px;
        }
        .toast.show { transform: translateX(0); }
        .toast-success { border-color: rgba(34,197,94,0.3); }
        .toast-success::before { content: '\f058'; font-family: 'Font Awesome 6 Free'; font-weight: 900; color: var(--success); margin-right: 8px; }
        .toast-error { border-color: rgba(239,68,68,0.3); }
        .toast-error::before { content: '\f057'; font-family: 'Font Awesome 6 Free'; font-weight: 900; color: var(--danger); margin-right: 8px; }
        .toast-info { border-color: rgba(56,189,248,0.3); }
        .toast-info::before { content: '\f05a'; font-family: 'Font Awesome 6 Free'; font-weight: 900; color: var(--info); margin-right: 8px; }

        .hidden { display: none !important; }
        @media (max-width: 700px) {
            .container { padding: 28px 14px 60px; }
            .stat-grid { grid-template-columns: repeat(2, 1fr); }
            .url-row { flex-direction: column; }
            .decode-btn { padding: 12px; justify-content: center; }
            .search-input { width: 140px; }
            .section-head { flex-direction: column; align-items: flex-start; }
            .proxy-custom { width: 100%; }
        }
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-blob bg-blob-1"></div>
    <div class="bg-blob bg-blob-2"></div>
    <div id="toastBox"></div>

    <main class="container">
        <header>
            <div class="logo">
                <div class="logo-icon"><i class="fas fa-layer-group"></i></div>
                <span class="logo-text">WMS Decoder</span>
            </div>
            <p class="subtitle">Parse GetCapabilities — extract layers, version &amp; CRS info from any WMS server</p>
        </header>

        <section class="input-section">
            <div class="url-row">
                <div class="url-wrap">
                    <i class="fas fa-link"></i>
                    <input type="text" id="wmsUrl" placeholder="Paste WMS endpoint URL..." aria-label="WMS Server URL"
                        value="https://geodpags.skogsstyrelsen.se/arcgis/services/Geodataportal/GeodataportalVisaDVIS/MapServer/WMSServer?">
                </div>
                <button class="decode-btn" id="decodeBtn" aria-label="Decode WMS">
                    <i class="fas fa-satellite-dish"></i> Decode
                </button>
            </div>
            <div class="proxy-row">
                <label class="toggle">
                    <input type="checkbox" id="useProxy" checked>
                    <span class="toggle-track"></span>
                </label>
                <span>Use CORS proxy</span>
                <select class="proxy-select" id="proxySelect" aria-label="Proxy service">
                    <option value="allorigins">AllOrigins</option>
                    <option value="corsproxy">corsproxy.io</option>
                    <option value="custom">Custom...</option>
                </select>
                <input type="text" class="proxy-custom hidden" id="proxyCustom" placeholder="https://your-proxy.com/?url=" aria-label="Custom proxy URL">
                <small>Most WMS servers block direct browser requests</small>
            </div>
        </section>

        <div id="loadingArea" class="loading hidden">
            <div class="spinner"></div>
            <p id="loadingMsg">Fetching GetCapabilities document...</p>
        </div>
        <div id="errorArea" class="error-box hidden"></div>
        <div id="resultsArea" class="results hidden"></div>
    </main>

    <script>
    /* ====================================================================
       XML HELPERS — fully namespace-safe
       Never uses CSS selectors on XML elements. Always iterates .children
       and compares localName(). This works regardless of namespace prefix.
    ==================================================================== */

    function localName(el) {
        if (!el) return '';
        return el.localName || el.baseName || el.tagName || '';
    }

    // Get first direct child element matching local tag name (case-insensitive)
    function firstChild(parent, tag) {
        if (!parent) return null;
        const t = tag.toLowerCase();
        for (const c of parent.children) {
            if (localName(c).toLowerCase() === t) return c;
        }
        return null;
    }

    // Get all direct child elements matching local tag name (returns Array)
    function directChildren(parent, tag) {
        if (!parent) return [];
        const t = tag.toLowerCase();
        const out = [];
        for (const c of parent.children) {
            if (localName(c).toLowerCase() === t) out.push(c);
        }
        return out;
    }

    // Get text content of first direct child
    function childText(parent, tag) {
        const el = firstChild(parent, tag);
        return el ? el.textContent.trim() : '';
    }

    // Recursively find ALL elements matching local tag name (returns Array)
    function findAllRecursive(parent, tag) {
        if (!parent) return [];
        const t = tag.toLowerCase();
        const out = [];
        (function walk(el) {
            for (const c of el.children) {
                if (localName(c).toLowerCase() === t) out.push(c);
                walk(c);
            }
        })(parent);
        return out;
    }

    /* ====================================================================
       TOAST
    ==================================================================== */
    function toast(msg, type = 'info') {
        const el = document.createElement('div');
        el.className = `toast toast-${type}`;
        el.textContent = msg;
        document.getElementById('toastBox').appendChild(el);
        requestAnimationFrame(() => el.classList.add('show'));
        setTimeout(() => {
            el.classList.remove('show');
            setTimeout(() => el.remove(), 300);
        }, 2800);
    }

    /* ====================================================================
       PROXY CONFIG
    ==================================================================== */
    const PROXIES = {
        allorigins: 'https://api.allorigins.win/raw?url=',
        corsproxy: 'https://corsproxy.io/?',
    };

    function getProxyPrefix() {
        const sel = document.getElementById('proxySelect').value;
        if (sel === 'custom') {
            return document.getElementById('proxyCustom').value.trim();
        }
        return PROXIES[sel] || '';
    }

    // Proxy select change handler
    document.getElementById('proxySelect').addEventListener('change', (e) => {
        document.getElementById('proxyCustom').classList.toggle('hidden', e.target.value !== 'custom');
    });

    /* ====================================================================
       KNOWN CRS DESCRIPTIONS
    ==================================================================== */
    const CRS_INFO = {
        'EPSG:4326': 'WGS 84 geographic (lat, lon axis order in WMS 1.3.0)',
        'CRS:84': 'WGS 84 longitude-first axis order (lon, lat)',
        'EPSG:3857': 'Web Mercator (Google / OSM projection)',
        'EPSG:3006': 'SWEREF99 TM — Swedish national grid',
        'EPSG:3007': 'SWEREF99 13 30',
        'EPSG:3008': 'SWEREF99 14 15',
        'EPSG:3009': 'SWEREF99 15 45',
        'EPSG:3010': 'SWEREF99 16 30',
        'EPSG:3011': 'SWEREF99 17 15',
        'EPSG:3012': 'SWEREF99 18 00',
        'EPSG:3013': 'SWEREF99 18 45',
        'EPSG:3014': 'SWEREF99 19 30',
        'EPSG:3015': 'SWEREF99 20 15',
        'EPSG:3016': 'SWEREF99 21 00',
        'EPSG:3017': 'SWEREF99 21 45',
        'EPSG:3018': 'SWEREF99 22 30',
        'EPSG:3021': 'RT90 2.5 gon V — old Swedish grid',
        'EPSG:25832': 'ETRS89 / UTM zone 32N',
        'EPSG:25833': 'ETRS89 / UTM zone 33N',
        'EPSG:2154': 'RGF93 / Lambert-93 — French national grid',
        'EPSG:27700': 'OSGB 1936 / British National Grid',
        'EPSG:28992': 'Amersfoort / RD New — Dutch grid',
        'EPSG:3067': 'ETRS89 / GK25FIN — Finnish grid',
        'EPSG:3044': 'ETRS89 / UTM zone 33N (N-E)',
        'EPSG:32632': 'WGS 84 / UTM zone 32N',
        'EPSG:32633': 'WGS 84 / UTM zone 33N',
        'EPSG:4230': 'ED50 geographic',
        'EPSG:23030': 'ED50 / UTM zone 30N',
        'EPSG:23031': 'ED50 / UTM zone 31N',
        'EPSG:23032': 'ED50 / UTM zone 32N',
        'EPSG:4258': 'ETRS89 geographic',
        'EPSG:4979': 'WGS 84 3D geographic',
    };

    /* ====================================================================
       BUILD URL
    ==================================================================== */
    function buildCapUrl(baseUrl) {
        let url = baseUrl.trim().replace(/[?&]+$/, '');
        const sep = url.includes('?') ? '&' : '?';
        return `${url}${sep}SERVICE=WMS&REQUEST=GetCapabilities`;
    }

    /* ====================================================================
       FETCH WITH TIMEOUT
    ==================================================================== */
    function fetchWithTimeout(url, ms = 20000) {
        const ctrl = new AbortController();
        const timer = setTimeout(() => ctrl.abort(), ms);
        return fetch(url, { signal: ctrl.signal }).finally(() => clearTimeout(timer));
    }

    /* ====================================================================
       PARSE LAYER TREE
       Returns: { name, title, abstract, crs:[], children:[] }
    ==================================================================== */
    function parseLayerTree(el, depth, crsTagName) {
        const name = childText(el, 'Name');
        const title = childText(el, 'Title');
        const abstract = childText(el, 'Abstract');

        // Collect CRS/SRS from THIS layer only
        const crsEl = firstChild(el, crsTagName);
        const crs = crsEl
            ? crsEl.textContent.trim().split(/\s+/).filter(Boolean)
            : [];

        const children = directChildren(el, 'Layer').map(c => parseLayerTree(c, depth + 1, crsTagName));

        return { name, title, abstract, crs, depth, children };
    }

    // Flatten tree — by default only leaf layers (no children)
    function flattenTree(node, list, leavesOnly) {
        const isLeaf = node.children.length === 0;
        if (node.name && (isLeaf || !leavesOnly)) {
            list.push({ name: node.name, title: node.title, depth: node.depth, isGroup: !isLeaf });
        }
        node.children.forEach(c => flattenTree(c, list, leavesOnly));
        return list;
    }

    /* ====================================================================
       MAIN DECODE
    ==================================================================== */
    async function decodeWMS() {
        const urlInput = document.getElementById('wmsUrl');
        const useProxy = document.getElementById('useProxy').checked;
        const resultsArea = document.getElementById('resultsArea');
        const errorArea = document.getElementById('errorArea');
        const loadingArea = document.getElementById('loadingArea');
        const loadingMsg = document.getElementById('loadingMsg');
        const decodeBtn = document.getElementById('decodeBtn');

        const baseUrl = urlInput.value.trim();
        if (!baseUrl) {
            toast('Please enter a WMS URL', 'error');
            urlInput.focus();
            return;
        }

        resultsArea.classList.add('hidden');
        errorArea.classList.add('hidden');
        loadingArea.classList.remove('hidden');
        decodeBtn.disabled = true;

        let rawXml = '';
        const capUrl = buildCapUrl(baseUrl);

        try {
            if (useProxy) {
                const prefix = getProxyPrefix();
                if (!prefix) throw new Error('No proxy URL configured. Select a proxy or enter a custom one.');
                const proxyUrl = prefix + encodeURIComponent(capUrl);
                loadingMsg.textContent = 'Fetching via CORS proxy...';
                const resp = await fetchWithTimeout(proxyUrl, 25000);
                if (!resp.ok) throw new Error(`Proxy returned HTTP ${resp.status}`);
                rawXml = await resp.text();
            } else {
                loadingMsg.textContent = 'Fetching directly (no proxy)...';
                const resp = await fetchWithTimeout(capUrl, 15000);
                if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${resp.statusText}`);
                rawXml = await resp.text();
            }

            // Validate XML
            const trimmed = rawXml.trim();
            if (!trimmed.startsWith('<')) {
                throw new Error(
                    'Server did not return XML. It may be returning an HTML error page, or the URL is incorrect.<br><br>' +
                    'Try toggling the CORS proxy, or test this URL directly in your browser:<br>' +
                    `<code>${escapeHtml(capUrl)}</code>`
                );
            }

            const parser = new DOMParser();
            const xml = parser.parseFromString(rawXml, 'text/xml');

            if (xml.querySelector('parsererror')) {
                throw new Error('Failed to parse XML response — the document may be malformed.');
            }

            // Check for OGC Service Exception
            const excText = childText(xml.documentElement, 'ServiceException');
            if (excText) {
                let hint = '';
                if (excText.toLowerCase().includes('map') || excText.toLowerCase().includes('mapfile')) {
                    hint = '<br><br><strong>This looks like a MapServer.</strong> It may need an additional <code>map=</code> parameter in the URL (e.g. <code>?map=wmscastore</code>).';
                }
                throw new Error(`WMS Service Exception: ${escapeHtml(excText)}${hint}`);
            }

            /* --- Parse --- */
            const root = xml.documentElement;
            const version = root.getAttribute('version') || 'unknown';
            const rootTag = localName(root);

            // Determine WMS type from root tag
            let wmsLabel = 'Unknown';
            if (rootTag === 'WMT_MS_Capabilities') wmsLabel = 'WMS 1.1.1';
            else if (rootTag === 'WMS_Capabilities') wmsLabel = 'WMS 1.3.0';

            const isV13 = version.startsWith('1.3');
            const crsTagName = isV13 ? 'CRS' : 'SRS';

            // Service metadata
            const serviceEl = firstChild(root, 'Service');
            const serviceTitle = serviceEl ? childText(serviceEl, 'Title') : '';
            const serviceAbstract = serviceEl ? childText(serviceEl, 'Abstract') : '';
            const keywords = [];
            if (serviceEl) {
                const kwRoot = firstChild(serviceEl, 'KeywordList');
                if (kwRoot) {
                    findAllRecursive(kwRoot, 'Keyword').forEach(kw => {
                        const t = kw.textContent.trim();
                        if (t) keywords.push(t);
                    });
                }
            }

            // Capability > Layer
            const capEl = firstChild(root, 'Capability');
            const rootLayerEl = capEl ? firstChild(capEl, 'Layer') : null;

            if (!rootLayerEl) {
                throw new Error(
                    'No &lt;Layer&gt; element found under &lt;Capability&gt;. The service may require additional parameters ' +
                    '(e.g. <code>map=</code> for MapServer, or <code>layers=</code> for some ArcGIS services).<br><br>' +
                    'Test URL: <code>' + escapeHtml(capUrl) + '</code>'
                );
            }

            const layerTree = parseLayerTree(rootLayerEl, 0, crsTagName);

            // Collect ALL CRS values from entire Capability tree (recursive)
            const crsSet = new Set();
            if (capEl) {
                findAllRecursive(capEl, crsTagName).forEach(el => {
                    el.textContent.trim().split(/\s+/).filter(Boolean).forEach(c => crsSet.add(c));
                });
            }

            const allCrs = Array.from(crsSet).sort((a, b) => {
                const p = c => c === 'EPSG:4326' ? 0 : c === 'CRS:84' ? 1 : c === 'EPSG:3857' ? 2 : 3;
                return p(a) - p(b) || a.localeCompare(b);
            });

            const has4326 = crsSet.has('EPSG:4326');
            const hasCRS84 = crsSet.has('CRS:84');

            renderResults({
                version, wmsLabel, rootTag,
                serviceTitle, serviceAbstract, keywords,
                layerTree, allCrs, has4326, hasCRS84,
                isV13, rawXml
            });

        } catch (err) {
            let msg = err.message || 'Unknown error';
            if (err.name === 'AbortError') {
                msg = 'Request timed out. The server may be slow or unreachable. Try a different CORS proxy.';
            } else if (msg.includes('Failed to fetch') || msg.includes('NetworkError') || msg.includes('Load failed')) {
                msg = 'Network error — could not reach the server.<br><br>' +
                    'Possible causes: CORS restriction, server down, or invalid URL.<br>' +
                    'Try toggling the CORS proxy or switching proxy services.<br><br>' +
                    'Direct URL to test in browser:<br><code>' + escapeHtml(capUrl) + '</code>';
            }
            errorArea.innerHTML = `<i class="fas fa-exclamation-triangle"></i>${msg}`;
            errorArea.classList.remove('hidden');
        } finally {
            loadingArea.classList.add('hidden');
            decodeBtn.disabled = false;
        }
    }

    /* ====================================================================
       ESCAPE HTML
    ==================================================================== */
    function escapeHtml(str) {
        const d = document.createElement('div');
        d.textContent = str;
        return d.innerHTML;
    }

    /* ====================================================================
       RENDER RESULTS
    ==================================================================== */
    function renderResults(data) {
        const area = document.getElementById('resultsArea');
        const { version, wmsLabel, serviceTitle, serviceAbstract, keywords,
                layerTree, allCrs, has4326, hasCRS84, isV13, rawXml } = data;

        // Compute flat layer lists
        const leafLayers = flattenTree(layerTree, [], true);
        const allNamedLayers = flattenTree(layerTree, [], false);
        let displayLayers = leafLayers; // default: leaves only

        let html = '';

        // Service info
        if (serviceTitle || serviceAbstract || keywords.length) {
            html += `<div class="service-info">`;
            if (serviceTitle) html += `<div class="service-title">${escapeHtml(serviceTitle)}</div>`;
            if (serviceAbstract) html += `<div class="service-abstract">${escapeHtml(serviceAbstract)}</div>`;
            if (keywords.length) {
                html += `<div class="service-keywords">`;
                keywords.slice(0, 25).forEach(kw => {
                    html += `<span class="keyword-tag">${escapeHtml(kw)}</span>`;
                });
                if (keywords.length > 25) html += `<span class="keyword-tag">+${keywords.length - 25} more</span>`;
                html += `</div>`;
            }
            html += `</div>`;
        }

        // Stat cards
        html += `<div class="stat-grid">
            <div class="stat-card">
                <div class="stat-value version">${escapeHtml(version)}</div>
                <div class="stat-label">${escapeHtml(wmsLabel)}</div>
            </div>
            <div class="stat-card">
                <div class="stat-value count">${leafLayers.length}</div>
                <div class="stat-label">Leaf Layers</div>
            </div>
            <div class="stat-card">
                <div class="stat-value ${has4326 ? 'yes' : 'no'}">${has4326 ? '<i class="fas fa-check-circle"></i> Yes' : '<i class="fas fa-times-circle"></i> No'}</div>
                <div class="stat-label">EPSG:4326</div>
            </div>
            <div class="stat-card">
                <div class="stat-value ${hasCRS84 ? 'yes' : 'no'}">${hasCRS84 ? '<i class="fas fa-check-circle"></i> Yes' : '<i class="fas fa-times-circle"></i> No'}</div>
                <div class="stat-label">CRS:84</div>
            </div>
        </div>`;

        // CRS axis-order explanation
        if (isV13) {
            html += `<div class="info-box">
                <strong>WMS 1.3.0 axis order matters:</strong>
                <code>EPSG:4326</code> uses <strong>latitude-first</strong> axis order (lat, lon) per the EPSG spec,
                while <code>CRS:84</code> uses <strong>longitude-first</strong> (lon, lat) — same datum, different axis order.
                If your client sends coordinates in lon/lat order, use <code>CRS:84</code> to avoid swapped axes.
            </div>`;
        } else {
            html += `<div class="info-box">
                <strong>WMS 1.1.1 axis order:</strong>
                In version 1.1.1, <code>EPSG:4326</code> is conventionally interpreted as <strong>longitude-first</strong> (lon, lat),
                regardless of the official EPSG definition. The <code>CRS:84</code> identifier was introduced in WMS 1.3.0
                to explicitly declare lon/lat order without ambiguity.
            </div>`;
        }

        // Version negotiation note
        html += `<div class="warn-box">
            <strong>Version negotiation:</strong>
            GetCapabilities only reports the <em>highest</em> supported version. Most WMS servers also accept
            older versions (e.g. <code>VERSION=1.1.1</code> even when capabilities say 1.3.0).
            You can test both by changing the VERSION parameter in your GetMap requests.
        </div>`;

        // Group layers count info
        if (allNamedLayers.length !== leafLayers.length) {
            const groupCount = allNamedLayers.length - leafLayers.length;
            html += `<div class="warn-box">
                <strong>${groupCount} group layer(s) hidden.</strong>
                These are layers that contain sub-layers. ArcGIS services often have a root group called "Layers".
                Toggle "Show groups" below to include them.
            </div>`;
        }

        // === Layer Names Section ===
        html += `<div class="section">
            <div class="section-head">
                <h2><i class="fas fa-list"></i> Layer Names</h2>
                <div class="section-actions">
                    <label class="chk-label">
                        <input type="checkbox" id="showGroupsChk">
                        Show groups
                    </label>
                    <input type="text" class="search-input" id="layerSearch" placeholder="Filter layers..." aria-label="Filter layers">
                    <button class="btn-sm" id="copyAllBtn"><i class="fas fa-copy"></i> Copy All</button>
                </div>
            </div>
            <div class="layer-count-bar" id="layerCountBar">Showing ${leafLayers.length} layers</div>
            <div class="layer-list" id="layerList">`;
        leafLayers.forEach((layer, i) => {
            html += layerItemHtml(layer, i);
        });
        html += `</div></div>`;

        // === Layer Tree Section ===
        html += `<div class="section">
            <div class="section-head">
                <h2><i class="fas fa-sitemap"></i> Layer Tree</h2>
                <div class="section-actions">
                    <button class="btn-sm" id="expandAllBtn"><i class="fas fa-expand-alt"></i> Expand</button>
                    <button class="btn-sm" id="collapseAllBtn"><i class="fas fa-compress-alt"></i> Collapse</button>
                </div>
            </div>
            <div class="layer-tree" id="layerTree"></div>
        </div>`;

        // === CRS Section ===
        html += `<div class="section">
            <div class="section-head">
                <h2><i class="fas fa-globe"></i> Supported ${isV13 ? 'CRS' : 'SRS'}</h2>
                <div class="section-actions">
                    <span style="font-size:11px;color:var(--text-muted)">${allCrs.length} found</span>
                    <button class="btn-sm" id="copyCrsBtn"><i class="fas fa-copy"></i> Copy All</button>
                </div>
            </div>
            <div class="crs-list">`;
        allCrs.forEach(crs => {
            const hl = crs === 'EPSG:4326' || crs === 'CRS:84';
            const desc = CRS_INFO[crs] || '';
            html += `<div class="crs-item">
                <span class="crs-badge ${hl ? 'highlight' : 'normal'}">${escapeHtml(crs)}</span>
                ${desc ? `<span class="crs-desc">${escapeHtml(desc)}</span>` : ''}
            </div>`;
        });
        html += `</div></div>`;

        // === Raw XML Section ===
        const truncated = rawXml.length > 80000;
        const displayXml = truncated ? rawXml.substring(0, 80000) + '\n\n... (truncated)' : rawXml;
        html += `<div class="section">
            <div class="section-head">
                <h2><i class="fas fa-code"></i> Raw XML</h2>
                <div class="section-actions">
                    <span style="font-size:11px;color:var(--text-muted)">${(rawXml.length / 1024).toFixed(1)} KB${truncated ? ' (truncated)' : ''}</span>
                    <button class="btn-sm" id="toggleRawBtn"><i class="fas fa-chevron-down"></i> Show</button>
                </div>
            </div>
            <pre class="raw-xml hidden" id="rawXml">${escapeHtml(displayXml)}</pre>
        </div>`;

        area.innerHTML = html;
        area.classList.remove('hidden');

        // --- Post-render event wiring ---

        // Show groups toggle
        const showGroupsChk = document.getElementById('showGroupsChk');
        showGroupsChk.addEventListener('change', () => {
            displayLayers = showGroupsChk.checked ? allNamedLayers : leafLayers;
            renderLayerList(displayLayers);
        });

        // Search
        const searchInput = document.getElementById('layerSearch');
        searchInput.addEventListener('input', () => renderLayerList(displayLayers, searchInput.value));

        // Copy all layers
        document.getElementById('copyAllBtn').addEventListener('click', () => {
            const names = displayLayers.map(l => l.name).join(',');
            navigator.clipboard.writeText(names)
                .then(() => toast(`Copied ${displayLayers.length} layer names`, 'success'))
                .catch(() => toast('Copy failed', 'error'));
        });

        // Copy all CRS
        document.getElementById('copyCrsBtn').addEventListener('click', () => {
            navigator.clipboard.writeText(allCrs.join(', '))
                .then(() => toast(`Copied ${allCrs.length} CRS values`, 'success'))
                .catch(() => toast('Copy failed', 'error'));
        });

        // Layer tree
        buildTreeDOM(layerTree, document.getElementById('layerTree'));

        // Expand / Collapse
        document.getElementById('expandAllBtn').addEventListener('click', () => {
            document.querySelectorAll('#layerTree .tree-children').forEach(el => el.classList.remove('collapsed'));
            document.querySelectorAll('#layerTree .tree-toggle').forEach(el => el.classList.remove('collapsed'));
        });
        document.getElementById('collapseAllBtn').addEventListener('click', () => {
            document.querySelectorAll('#layerTree .tree-children').forEach(el => el.classList.add('collapsed'));
            document.querySelectorAll('#layerTree .tree-toggle:not(.hidden-toggle)').forEach(el => el.classList.add('collapsed'));
        });

        // Toggle raw XML
        document.getElementById('toggleRawBtn').addEventListener('click', () => {
            const pre = document.getElementById('rawXml');
            const btn = document.getElementById('toggleRawBtn');
            const show = pre.classList.toggle('hidden');
            btn.innerHTML = show
                ? '<i class="fas fa-chevron-down"></i> Show'
                : '<i class="fas fa-chevron-up"></i> Hide';
        });
    }

    /* ====================================================================
       RENDER LAYER LIST (dynamic, for search + toggle)
    ==================================================================== */
    function layerItemHtml(layer, i) {
        return `<div class="layer-item" data-name="${escapeHtml(layer.name)}" title="Click to copy">
            <span class="idx">${i + 1}</span>
            <span class="name">${escapeHtml(layer.name)}</span>
            ${layer.isGroup ? '<span class="group-badge">group</span>' : ''}
            <span class="copy-hint"><i class="fas fa-clipboard"></i></span>
        </div>`;
    }

    function renderLayerList(layers, filter = '') {
        const list = document.getElementById('layerList');
        const bar = document.getElementById('layerCountBar');
        const q = filter.toLowerCase();
        let html = '';
        let count = 0;
        layers.forEach((layer, i) => {
            if (layer.name.toLowerCase().includes(q)) {
                html += layerItemHtml(layer, count);
                count++;
            }
        });
        if (!html) html = '<div class="layer-empty">No layers match your filter</div>';
        list.innerHTML = html;
        bar.textContent = q
            ? `Showing ${count} of ${layers.length} layers`
            : `Showing ${layers.length} layers`;

        // Wire click-to-copy on new items
        list.querySelectorAll('.layer-item').forEach(item => {
            item.addEventListener('click', () => {
                navigator.clipboard.writeText(item.dataset.name)
                    .then(() => toast(`Copied: ${item.dataset.name}`, 'success'))
                    .catch(() => toast('Copy failed', 'error'));
            });
        });
    }

    /* ====================================================================
       BUILD LAYER TREE DOM
    ==================================================================== */
    function buildTreeDOM(node, container) {
        const hasChildren = node.children.length > 0;
        const isLeaf = !!node.name && !hasChildren;

        const row = document.createElement('div');
        row.className = 'tree-row';

        // Toggle arrow
        const toggle = document.createElement('span');
        toggle.className = 'tree-toggle' + (hasChildren ? '' : ' hidden-toggle');
        if (hasChildren) toggle.textContent = '\u25BC';
        row.appendChild(toggle);

        // Icon
        const icon = document.createElement('span');
        icon.className = 'tree-icon ' + (isLeaf ? 'leaf' : 'folder');
        icon.innerHTML = isLeaf
            ? '<i class="fas fa-layer-group"></i>'
            : '<i class="fas fa-folder"></i>';
        row.appendChild(icon);

        // Name/title
        const nameSpan = document.createElement('span');
        nameSpan.className = 'tree-name' + (!isLeaf ? ' folder-name' : '');
        nameSpan.textContent = node.name || node.title || '(unnamed)';
        nameSpan.title = node.name || node.title || '';
        row.appendChild(nameSpan);

        container.appendChild(row);

        // Children
        if (hasChildren) {
            const childContainer = document.createElement('div');
            childContainer.className = 'tree-children';

            const toggleClick = (e) => {
                e.stopPropagation();
                childContainer.classList.toggle('collapsed');
                toggle.classList.toggle('collapsed');
            };
            toggle.style.cursor = 'pointer';
            toggle.addEventListener('click', toggleClick);
            row.addEventListener('click', (e) => {
                if (e.target.closest('.tree-name:not(.folder-name)')) return;
                childContainer.classList.toggle('collapsed');
                toggle.classList.toggle('collapsed');
            });

            node.children.forEach(c => buildTreeDOM(c, childContainer));
            container.appendChild(childContainer);
        } else if (node.name) {
            // Leaf — click to copy
            row.style.cursor = 'pointer';
            row.title = 'Click to copy: ' + node.name;
            row.addEventListener('click', () => {
                navigator.clipboard.writeText(node.name)
                    .then(() => toast(`Copied: ${node.name}`, 'success'))
                    .catch(() => toast('Copy failed', 'error'));
            });
        }
    }

    /* ====================================================================
       EVENT LISTENERS
    ==================================================================== */
    document.getElementById('decodeBtn').addEventListener('click', decodeWMS);
    document.getElementById('wmsUrl').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') decodeWMS();
    });
    </script>
</body>
</html>
