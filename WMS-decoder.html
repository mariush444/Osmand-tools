<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS Decoder</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=DM+Sans:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #060a13;
            --bg2: #0b1120;
            --card: #0d1424;
            --card-hover: #111c30;
            --border: #1a2740;
            --border-light: #243352;
            --text: #e2e8f0;
            --text-dim: #94a3b8;
            --text-muted: #4a5e7a;
            --accent: #00e5b0;
            --accent-dim: rgba(0,229,176,0.08);
            --accent-mid: rgba(0,229,176,0.25);
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #38bdf8;
            --mono: 'JetBrains Mono', monospace;
            --sans: 'DM Sans', sans-serif;
            --radius: 10px;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
        }
        .bg-grid {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background-image: radial-gradient(circle, rgba(0,229,176,0.04) 1px, transparent 1px);
            background-size: 28px 28px;
        }
        .bg-blob {
            position: fixed; border-radius: 50%; filter: blur(120px); z-index: 0; pointer-events: none;
        }
        .bg-blob-1 {
            width: 600px; height: 600px; top: -200px; left: -100px;
            background: rgba(0,229,176,0.04);
            animation: blobDrift 25s ease-in-out infinite alternate;
        }
        .bg-blob-2 {
            width: 500px; height: 500px; bottom: -150px; right: -100px;
            background: rgba(56,189,248,0.03);
            animation: blobDrift 30s ease-in-out infinite alternate-reverse;
        }
        @keyframes blobDrift {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(60px, 40px) scale(1.1); }
            100% { transform: translate(-30px, 70px) scale(0.95); }
        }
        .container {
            position: relative; z-index: 1;
            max-width: 1080px; margin: 0 auto;
            padding: 48px 24px 80px;
        }
        header { margin-bottom: 36px; }
        .logo { display: flex; align-items: center; gap: 14px; margin-bottom: 8px; }
        .logo-icon {
            width: 44px; height: 44px; border-radius: 12px;
            background: linear-gradient(135deg, var(--accent), #00b894);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; color: #060a13; flex-shrink: 0;
            box-shadow: 0 0 24px rgba(0,229,176,0.2);
        }
        .logo-text {
            font-size: 28px; font-weight: 900; letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--text), var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle { color: var(--text-muted); font-size: 15px; margin-left: 58px; margin-top: -4px; }
        .input-section {
            background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 20px; margin-bottom: 32px;
        }
        .url-row { display: flex; gap: 10px; margin-bottom: 14px; }
        .url-wrap {
            flex: 1; display: flex; align-items: center;
            background: var(--bg2); border: 1px solid var(--border);
            border-radius: 8px; padding: 0 14px; transition: border-color 0.2s;
        }
        .url-wrap:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
        .url-wrap i { color: var(--text-muted); font-size: 14px; margin-right: 10px; flex-shrink: 0; }
        .url-wrap input {
            flex: 1; background: none; border: none; outline: none;
            color: var(--text); font-family: var(--mono); font-size: 13px;
            padding: 12px 0; min-width: 0;
        }
        .url-wrap input::placeholder { color: var(--text-muted); }
        .decode-btn {
            display: flex; align-items: center; gap: 8px;
            padding: 0 24px; border: none; border-radius: 8px;
            background: linear-gradient(135deg, var(--accent), #00b894);
            color: #060a13; font-family: var(--sans); font-weight: 700;
            font-size: 14px; cursor: pointer; white-space: nowrap;
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 2px 16px rgba(0,229,176,0.25);
        }
        .decode-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 24px rgba(0,229,176,0.35); }
        .decode-btn:active { transform: translateY(0); }
        .decode-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .proxy-row {
            display: flex; align-items: center; gap: 12px; font-size: 13px; color: var(--text-dim); flex-wrap: wrap;
        }
        .proxy-select {
            background: var(--bg2); border: 1px solid var(--border);
            border-radius: 6px; padding: 5px 10px; font-size: 12px;
            color: var(--text); font-family: var(--mono); outline: none;
            cursor: pointer;
        }
        .proxy-select:focus { border-color: var(--accent); }
        .proxy-status { font-size: 11px; }
        .proxy-status.trying { color: var(--warning); }
        .proxy-status.ok { color: var(--success); }
        .proxy-status.fail { color: var(--danger); }
        .loading { text-align: center; padding: 60px 20px; color: var(--text-dim); }
        .spinner {
            width: 40px; height: 40px; margin: 0 auto 16px;
            border: 3px solid var(--border); border-top-color: var(--accent);
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-box {
            background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25);
            border-radius: var(--radius); padding: 20px 24px;
            color: #fca5a5; font-size: 14px; line-height: 1.7;
        }
        .error-box i { color: var(--danger); margin-right: 8px; }
        .error-box code {
            background: rgba(239,68,68,0.12); padding: 2px 6px; border-radius: 4px;
            font-family: var(--mono); font-size: 12px; color: #fecaca;
            word-break: break-all;
        }
        .results { animation: fadeUp 0.4s ease-out; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .service-info {
            background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 20px 24px; margin-bottom: 24px;
        }
        .service-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
        .service-abstract { font-size: 13px; color: var(--text-dim); line-height: 1.6; }
        .service-keywords { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px; }
        .keyword-tag {
            font-size: 11px; padding: 3px 10px; border-radius: 20px;
            background: var(--accent-dim); color: var(--accent);
            border: 1px solid rgba(0,229,176,0.15);
        }
        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
        .stat-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 20px; text-align: center;
            transition: border-color 0.2s;
        }
        .stat-card:hover { border-color: var(--border-light); }
        .stat-value {
            font-size: 28px; font-weight: 900; font-family: var(--mono);
            margin-bottom: 4px; line-height: 1.2;
        }
        .stat-value.version { color: var(--info); }
        .stat-value.count { color: var(--accent); }
        .stat-value.yes { color: var(--success); font-size: 22px; }
        .stat-value.no { color: var(--danger); font-size: 22px; }
        .stat-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .crs-note {
            background: rgba(56,189,248,0.06); border: 1px solid rgba(56,189,248,0.18);
            border-radius: var(--radius); padding: 18px 22px; margin-bottom: 24px;
            font-size: 13px; color: var(--text-dim); line-height: 1.7;
        }
        .crs-note strong { color: var(--text); }
        .crs-note code {
            background: rgba(56,189,248,0.1); padding: 1px 6px; border-radius: 4px;
            font-family: var(--mono); font-size: 12px; color: var(--info);
        }
        .section {
            background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius); margin-bottom: 24px; overflow: hidden;
        }
        .section-head {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 22px; border-bottom: 1px solid var(--border);
            flex-wrap: wrap; gap: 10px;
        }
        .section-head h2 {
            font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 8px;
        }
        .section-head h2 i { color: var(--accent); font-size: 14px; }
        .section-actions { display: flex; align-items: center; gap: 8px; }
        .search-input {
            background: var(--bg2); border: 1px solid var(--border);
            border-radius: 6px; padding: 6px 12px; font-size: 12px;
            color: var(--text); outline: none; width: 200px;
            font-family: var(--sans); transition: border-color 0.2s;
        }
        .search-input:focus { border-color: var(--accent); }
        .search-input::placeholder { color: var(--text-muted); }
        .btn-sm {
            display: flex; align-items: center; gap: 5px;
            padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border);
            background: var(--bg2); color: var(--text-dim); font-size: 12px;
            font-family: var(--sans); cursor: pointer; transition: all 0.15s;
        }
        .btn-sm:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
        .layer-list { max-height: 400px; overflow-y: auto; }
        .layer-list::-webkit-scrollbar { width: 6px; }
        .layer-list::-webkit-scrollbar-track { background: transparent; }
        .layer-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        .layer-item {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 22px; border-bottom: 1px solid rgba(26,39,64,0.5);
            cursor: pointer; transition: background 0.12s; font-size: 13px;
        }
        .layer-item:last-child { border-bottom: none; }
        .layer-item:hover { background: var(--accent-dim); }
        .layer-item .idx {
            min-width: 32px; text-align: right; color: var(--text-muted);
            font-family: var(--mono); font-size: 11px; user-select: none;
        }
        .layer-item .name {
            flex: 1; font-family: var(--mono); font-size: 12.5px;
            color: var(--text); word-break: break-all; min-width: 0;
        }
        .layer-item .copy-hint {
            opacity: 0; color: var(--text-muted); font-size: 11px;
            transition: opacity 0.15s; flex-shrink: 0;
        }
        .layer-item:hover .copy-hint { opacity: 1; }
        .layer-empty { padding: 30px; text-align: center; color: var(--text-muted); font-size: 13px; }
        .layer-count-bar {
            padding: 8px 22px; background: var(--bg2); font-size: 11px;
            color: var(--text-muted); border-bottom: 1px solid var(--border);
        }
        .layer-tree { padding: 12px 0; max-height: 500px; overflow-y: auto; }
        .layer-tree::-webkit-scrollbar { width: 6px; }
        .layer-tree::-webkit-scrollbar-track { background: transparent; }
        .layer-tree::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        .tree-node { user-select: none; }
        .tree-row {
            display: flex; align-items: center; gap: 6px;
            padding: 5px 22px; cursor: pointer; transition: background 0.1s;
        }
        .tree-row:hover { background: var(--accent-dim); }
        .tree-toggle {
            width: 18px; height: 18px; display: flex; align-items: center;
            justify-content: center; font-size: 10px; color: var(--text-muted);
            flex-shrink: 0; transition: transform 0.15s;
        }
        .tree-toggle.collapsed { transform: rotate(-90deg); }
        .tree-toggle.hidden-toggle { visibility: hidden; }
        .tree-icon { font-size: 13px; flex-shrink: 0; }
        .tree-icon.folder { color: var(--warning); }
        .tree-icon.leaf { color: var(--accent); }
        .tree-name {
            font-family: var(--mono); font-size: 12px; color: var(--text);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .tree-name.folder-name { color: var(--text-dim); font-family: var(--sans); font-weight: 600; font-size: 13px; }
        .tree-children { overflow: hidden; }
        .tree-children.collapsed { display: none; }
        .crs-list { padding: 12px 0; }
        .crs-item {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 22px; transition: background 0.1s;
        }
        .crs-item:hover { background: var(--accent-dim); }
        .crs-badge {
            font-family: var(--mono); font-size: 12px; padding: 3px 10px;
            border-radius: 5px; font-weight: 600; flex-shrink: 0;
        }
        .crs-badge.highlight {
            background: var(--accent-dim); color: var(--accent);
            border: 1px solid rgba(0,229,176,0.2);
        }
        .crs-badge.normal {
            background: var(--bg2); color: var(--text-dim);
            border: 1px solid var(--border);
        }
        .crs-desc { font-size: 12px; color: var(--text-muted); }
        .raw-xml {
            margin: 0; padding: 16px 22px; font-family: var(--mono);
            font-size: 11.5px; line-height: 1.6; color: var(--text-dim);
            max-height: 500px; overflow: auto; white-space: pre-wrap;
            word-break: break-all; background: var(--bg2);
        }
        .raw-xml::-webkit-scrollbar { width: 6px; }
        .raw-xml::-webkit-scrollbar-track { background: transparent; }
        .raw-xml::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        #toastBox {
            position: fixed; bottom: 24px; right: 24px; z-index: 9999;
            display: flex; flex-direction: column; gap: 8px; pointer-events: none;
        }
        .toast {
            padding: 10px 18px; border-radius: 8px; font-size: 13px;
            font-family: var(--sans); color: var(--text);
            background: var(--card); border: 1px solid var(--border);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            transform: translateX(120%); transition: transform 0.3s ease;
            pointer-events: auto;
        }
        .toast.show { transform: translateX(0); }
        .toast-success { border-color: rgba(34,197,94,0.3); }
        .toast-success::before { content: '\f058'; font-family: 'Font Awesome 6 Free'; font-weight: 900; color: var(--success); margin-right: 8px; }
        .toast-error { border-color: rgba(239,68,68,0.3); }
        .toast-error::before { content: '\f057'; font-family: 'Font Awesome 6 Free'; font-weight: 900; color: var(--danger); margin-right: 8px; }
        .toast-info { border-color: rgba(56,189,248,0.3); }
        .toast-info::before { content: '\f05a'; font-family: 'Font Awesome 6 Free'; font-weight: 900; color: var(--info); margin-right: 8px; }
        .hidden { display: none !important; }
        @media (max-width: 700px) {
            .container { padding: 28px 14px 60px; }
            .stat-grid { grid-template-columns: repeat(2, 1fr); }
            .url-row { flex-direction: column; }
            .decode-btn { padding: 12px; justify-content: center; }
            .search-input { width: 140px; }
            .section-head { flex-direction: column; align-items: flex-start; }
        }
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-blob bg-blob-1"></div>
    <div class="bg-blob bg-blob-2"></div>
    <div id="toastBox"></div>

    <main class="container">
        <header>
            <div class="logo">
                <div class="logo-icon"><i class="fas fa-layer-group"></i></div>
                <span class="logo-text">WMS Decoder</span>
            </div>
            <p class="subtitle">Parse GetCapabilities — extract layers, version &amp; CRS info from any WMS server</p>
        </header>

        <section class="input-section">
            <div class="url-row">
                <div class="url-wrap">
                    <i class="fas fa-link"></i>
                    <input type="text" id="wmsUrl" placeholder="Paste WMS endpoint URL..." aria-label="WMS Server URL"
                        value="https://geodpags.skogsstyrelsen.se/arcgis/services/Geodataportal/GeodataportalVisaDVIS/MapServer/WMSServer?">
                </div>
                <button class="decode-btn" id="decodeBtn" aria-label="Decode WMS">
                    <i class="fas fa-satellite-dish"></i> Decode
                </button>
            </div>
            <div class="proxy-row">
                <span>Proxy:</span>
                <select class="proxy-select" id="proxySelect" aria-label="CORS proxy selection">
                    <option value="auto">Auto (try all)</option>
                    <option value="corsproxy">corsproxy.io</option>
                    <option value="allorigins">allorigins.win</option>
                    <option value="codetabs">codetabs.com</option>
                    <option value="none" selected>No proxy (direct)</option>
                </select>
                <span id="proxyStatus" class="proxy-status"></span>
            </div>
        </section>

        <div id="loadingArea" class="loading hidden">
            <div class="spinner"></div>
            <p id="loadingMsg">Fetching GetCapabilities document...</p>
        </div>

        <div id="errorArea" class="error-box hidden"></div>
        <div id="resultsArea" class="results hidden"></div>
    </main>

    <script>
        /* ===== DOM helpers — iterate children by localName ===== */
        /* This avoids :scope > selectors which break on namespaced XML from DOMParser */
        function localName(el) {
            if (!el) return '';
            return el.localName || el.baseName || el.tagName || '';
        }

        function childByTag(parent, tag) {
            if (!parent || !parent.children) return null;
            const lower = tag.toLowerCase();
            for (const c of parent.children) {
                if (localName(c).toLowerCase() === lower) return c;
            }
            return null;
        }

        function childrenByTag(parent, tag) {
            if (!parent || !parent.children) return [];
            const lower = tag.toLowerCase();
            const out = [];
            for (const c of parent.children) {
                if (localName(c).toLowerCase() === lower) out.push(c);
            }
            return out; // Always a real Array
        }

        function childText(parent, tag) {
            const el = childByTag(parent, tag);
            return el ? (el.textContent || '').trim() : '';
        }

        /* ===== Toast ===== */
        function toast(msg, type = 'info') {
            const el = document.createElement('div');
            el.className = `toast toast-${type}`;
            el.textContent = msg;
            document.getElementById('toastBox').appendChild(el);
            requestAnimationFrame(() => el.classList.add('show'));
            setTimeout(() => {
                el.classList.remove('show');
                setTimeout(() => el.remove(), 300);
            }, 2800);
        }

        /* ===== Proxy configuration ===== */
        const PROXIES = {
            corsproxy:  (url) => `https://corsproxy.io/?${encodeURIComponent(url)}`,
            allorigins: (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
            codetabs:   (url) => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
            none:       (url) => url
        };

        const PROXY_ORDER = ['corsproxy', 'allorigins', 'codetabs', 'none'];

        function getProxyChain(mode) {
            if (mode === 'auto') return PROXY_ORDER;
            if (mode === 'none') return ['none'];
            return [mode, 'none']; // Selected proxy, then fallback to direct
        }

        /* ===== Build GetCapabilities URL ===== */
        function buildCapUrl(baseUrl) {
            let url = baseUrl.trim().replace(/[?&]+$/, '');
            const sep = url.includes('?') ? '&' : '?';
            return `${url}${sep}SERVICE=WMS&REQUEST=GetCapabilities`;
        }

        /* ===== Known CRS descriptions ===== */
        const CRS_INFO = {
            'EPSG:4326': 'WGS 84 geographic (lat, lon)',
            'CRS:84':    'WGS 84 longitude-first axis order',
            'EPSG:3857': 'Web Mercator (Google/OSM projection)',
            'EPSG:3006': 'SWEREF99 TM — Swedish national grid',
            'EPSG:3007': 'SWEREF99 13 30 local zone',
            'EPSG:3008': 'SWEREF99 14 15 local zone',
            'EPSG:3009': 'SWEREF99 15 45 local zone',
            'EPSG:3010': 'SWEREF99 16 30 local zone',
            'EPSG:3011': 'SWEREF99 17 15 local zone',
            'EPSG:3012': 'SWEREF99 18 00 local zone',
            'EPSG:3013': 'SWEREF99 18 45 local zone',
            'EPSG:3014': 'SWEREF99 19 30 local zone',
            'EPSG:3015': 'SWEREF99 20 15 local zone',
            'EPSG:3016': 'SWEREF99 21 00 local zone',
            'EPSG:3017': 'SWEREF99 21 45 local zone',
            'EPSG:3018': 'SWEREF99 22 30 local zone',
            'EPSG:3021': 'RT90 2.5 gon V — old Swedish grid',
            'EPSG:4230': 'ED50 geographic',
            'EPSG:25832': 'ETRS89 / UTM zone 32N',
            'EPSG:25833': 'ETRS89 / UTM zone 33N',
            'EPSG:2154': 'RGF93 / Lambert-93 — French grid',
            'EPSG:27700': 'OSGB / British National Grid',
            'EPSG:28992': 'Amersfoort / RD New — Dutch grid',
            'EPSG:3067': 'ETRS89 / GK25FIN — Finnish grid',
            'EPSG:3044': 'ETRS89 / UTM 33N (N-E) — German',
            'EPSG:32632': 'WGS 84 / UTM zone 32N',
            'EPSG:32633': 'WGS 84 / UTM zone 33N',
        };

        /* ===== Parse layer tree ===== */
        function parseLayerTree(el, depth) {
            depth = depth || 0;
            const name = childText(el, 'Name');
            const title = childText(el, 'Title');
            const abstract = childText(el, 'Abstract');
            const kids = childrenByTag(el, 'Layer');
            const children = kids.map(c => parseLayerTree(c, depth + 1));
            return { name: name, title: title, abstract: abstract, depth: depth, children: children };
        }

        function flattenTree(node, list) {
            list = list || [];
            if (node.name) list.push({ name: node.name, title: node.title, depth: node.depth });
            for (let i = 0; i < node.children.length; i++) {
                flattenTree(node.children[i], list);
            }
            return list;
        }

        /* ===== Collect CRS from element and all nested layers ===== */
        function collectCrs(el, tag, set) {
            const crsEl = childByTag(el, tag);
            if (crsEl) {
                (crsEl.textContent || '').trim().split(/\s+/).forEach(function(c) {
                    if (c) set.add(c);
                });
            }
            const layers = childrenByTag(el, 'Layer');
            for (let i = 0; i < layers.length; i++) {
                collectCrs(layers[i], tag, set);
            }
        }

        /* ===== Escape HTML ===== */
        function esc(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        /* ===== Fetch with proxy fallback ===== */
        async function fetchWithFallback(capUrl, proxyChain, statusEl, msgEl) {
            let lastError = null;

            for (let i = 0; i < proxyChain.length; i++) {
                const key = proxyChain[i];
                const isDirect = (key === 'none');
                const fetchUrl = isDirect ? capUrl : PROXIES[key](capUrl);

                statusEl.className = 'proxy-status trying';
                statusEl.textContent = isDirect ? 'Trying direct...' : 'Trying ' + key + '...';
                msgEl.textContent = isDirect
                    ? 'Fetching directly from server...'
                    : 'Fetching via ' + key + ' proxy...';

                try {
                    const resp = await fetch(fetchUrl, {
                        headers: { 'Accept': 'application/xml, text/xml, */*' }
                    });

                    if (!resp.ok) {
                        lastError = new Error('HTTP ' + resp.status + ' ' + resp.statusText);
                        continue;
                    }

                    const text = await resp.text();
                    const trimmed = text.trim();

                    // Validate it's actually XML, not an HTML error page from a proxy
                    if (!trimmed.startsWith('<') || trimmed.startsWith('<!DOCTYPE HTML') || trimmed.startsWith('<html')) {
                        lastError = new Error('Response is not XML (got HTML or other content)');
                        continue;
                    }

                    statusEl.className = 'proxy-status ok';
                    statusEl.textContent = isDirect ? 'Direct' : key;
                    return text;

                } catch (err) {
                    lastError = err;
                    continue;
                }
            }

            statusEl.className = 'proxy-status fail';
            statusEl.textContent = 'All failed';
            throw lastError || new Error('All proxy options failed');
        }

        /* ===== Main decode ===== */
        async function decodeWMS() {
            const urlInput = document.getElementById('wmsUrl');
            const proxySelect = document.getElementById('proxySelect');
            const proxyStatus = document.getElementById('proxyStatus');
            const resultsArea = document.getElementById('resultsArea');
            const errorArea = document.getElementById('errorArea');
            const loadingArea = document.getElementById('loadingArea');
            const loadingMsg = document.getElementById('loadingMsg');
            const decodeBtn = document.getElementById('decodeBtn');

            const baseUrl = urlInput.value.trim();
            if (!baseUrl) {
                toast('Please enter a WMS URL', 'error');
                urlInput.focus();
                return;
            }

            resultsArea.classList.add('hidden');
            errorArea.classList.add('hidden');
            loadingArea.classList.remove('hidden');
            decodeBtn.disabled = true;

            try {
                const capUrl = buildCapUrl(baseUrl);
                const proxyChain = getProxyChain(proxySelect.value);
                const rawXml = await fetchWithFallback(capUrl, proxyChain, proxyStatus, loadingMsg);

                // Parse XML
                const parser = new DOMParser();
                const xml = parser.parseFromString(rawXml, 'text/xml');

                const parseErr = xml.querySelector('parsererror');
                if (parseErr) {
                    throw new Error('Failed to parse XML response — the document may be malformed.');
                }

                // OGC service exception
                const exc = xml.querySelector('ServiceException');
                if (exc) {
                    throw new Error('WMS Service Exception: ' + (exc.textContent || '').trim());
                }

                const root = xml.documentElement;
                const version = root.getAttribute('version') || 'unknown';
                const rootTag = localName(root);

                // Determine WMS type from root tag name
                let wmsLabel = 'Unknown';
                if (rootTag.toLowerCase() === 'wmt_ms_capabilities') wmsLabel = 'WMS 1.1.1';
                else if (rootTag.toLowerCase() === 'wms_capabilities') wmsLabel = 'WMS 1.3.0';

                const isV13 = version.startsWith('1.3');
                const crsTag = isV13 ? 'CRS' : 'SRS';

                // Service metadata
                const serviceEl = childByTag(root, 'Service');
                const serviceTitle = serviceEl ? childText(serviceEl, 'Title') : '';
                const serviceAbstract = serviceEl ? childText(serviceEl, 'Abstract') : '';
                const keywords = [];
                if (serviceEl) {
                    const kwRoot = childByTag(serviceEl, 'KeywordList');
                    if (kwRoot) {
                        // Use querySelectorAll for Keyword (deeper nested, no namespace issues usually)
                        var kwEls = kwRoot.querySelectorAll('Keyword');
                        for (var ki = 0; ki < kwEls.length; ki++) {
                            var t = (kwEls[ki].textContent || '').trim();
                            if (t) keywords.push(t);
                        }
                    }
                }

                // Parse layers
                const capabilityEl = childByTag(root, 'Capability');
                const rootLayerEl = capabilityEl ? childByTag(capabilityEl, 'Layer') : null;

                var layerTree = { name: '', title: '', abstract: '', depth: 0, children: [] };
                if (rootLayerEl) {
                    layerTree = parseLayerTree(rootLayerEl);
                }
                var flatLayers = flattenTree(layerTree);

                // Collect CRS from root layer (authoritative list)
                var crsSet = new Set();
                if (rootLayerEl) {
                    collectCrs(rootLayerEl, crsTag, crsSet);
                }

                var allCrs = Array.from(crsSet).sort(function(a, b) {
                    var p = function(c) {
                        if (c === 'EPSG:4326') return 0;
                        if (c === 'CRS:84') return 1;
                        if (c === 'EPSG:3857') return 2;
                        return 3;
                    };
                    return p(a) - p(b) || a.localeCompare(b);
                });

                var has4326 = crsSet.has('EPSG:4326');
                var hasCRS84 = crsSet.has('CRS:84');

                renderResults({
                    version: version, wmsLabel: wmsLabel, rootTag: rootTag,
                    serviceTitle: serviceTitle, serviceAbstract: serviceAbstract, keywords: keywords,
                    layerTree: layerTree, flatLayers: flatLayers,
                    allCrs: allCrs, has4326: has4326, hasCRS84: hasCRS84,
                    isV13: isV13, rawXml: rawXml
                });

            } catch (err) {
                var html = '<i class="fas fa-exclamation-triangle"></i>' + esc(err.message);
                html += '<br><br><small>If all proxies fail, try opening this URL directly in a new tab and paste the XML here:<br>';
                html += '<code>' + esc(buildCapUrl(baseUrl)) + '</code></small>';
                errorArea.innerHTML = html;
                errorArea.classList.remove('hidden');
            } finally {
                loadingArea.classList.add('hidden');
                decodeBtn.disabled = false;
            }
        }

        /* ===== Render results ===== */
        function renderResults(data) {
            var area = document.getElementById('resultsArea');
            var version = data.version, wmsLabel = data.wmsLabel;
            var serviceTitle = data.serviceTitle, serviceAbstract = data.serviceAbstract;
            var keywords = data.keywords, layerTree = data.layerTree, flatLayers = data.flatLayers;
            var allCrs = data.allCrs, has4326 = data.has4326, hasCRS84 = data.hasCRS84;
            var isV13 = data.isV13, rawXml = data.rawXml;

            var html = '';

            // Service info
            if (serviceTitle || serviceAbstract || keywords.length) {
                html += '<div class="service-info">';
                if (serviceTitle) html += '<div class="service-title">' + esc(serviceTitle) + '</div>';
                if (serviceAbstract) html += '<div class="service-abstract">' + esc(serviceAbstract) + '</div>';
                if (keywords.length) {
                    html += '<div class="service-keywords">';
                    var kwShow = keywords.slice(0, 20);
                    for (var k = 0; k < kwShow.length; k++) {
                        html += '<span class="keyword-tag">' + esc(kwShow[k]) + '</span>';
                    }
                    if (keywords.length > 20) html += '<span class="keyword-tag">+' + (keywords.length - 20) + ' more</span>';
                    html += '</div>';
                }
                html += '</div>';
            }

            // Stat cards
            html += '<div class="stat-grid">';
            html += '<div class="stat-card"><div class="stat-value version">' + esc(version) + '</div><div class="stat-label">' + esc(wmsLabel) + '</div></div>';
            html += '<div class="stat-card"><div class="stat-value count">' + flatLayers.length + '</div><div class="stat-label">Layers</div></div>';
            html += '<div class="stat-card"><div class="stat-value ' + (has4326 ? 'yes' : 'no') + '">' + (has4326 ? '<i class="fas fa-check-circle"></i> Yes' : '<i class="fas fa-times-circle"></i> No') + '</div><div class="stat-label">EPSG:4326</div></div>';
            html += '<div class="stat-card"><div class="stat-value ' + (hasCRS84 ? 'yes' : 'no') + '">' + (hasCRS84 ? '<i class="fas fa-check-circle"></i> Yes' : '<i class="fas fa-times-circle"></i> No') + '</div><div class="stat-label">CRS:84</div></div>';
            html += '</div>';

            // CRS explanation
            if (isV13) {
                html += '<div class="crs-note"><strong>WMS 1.3.0 axis order matters:</strong> <code>EPSG:4326</code> uses <strong>latitude-first</strong> axis order (lat, lon), while <code>CRS:84</code> uses <strong>longitude-first</strong> (lon, lat) — same datum, different axis order. If your client sends coordinates in lon/lat order, use <code>CRS:84</code> to avoid swapped axes. In WMS 1.1.1, <code>EPSG:4326</code> is always treated as lon/lat.</div>';
            } else {
                html += '<div class="crs-note"><strong>WMS 1.1.1 axis order:</strong> In version 1.1.1, <code>EPSG:4326</code> is conventionally interpreted as <strong>longitude-first</strong> (lon, lat), regardless of the official EPSG definition. The <code>CRS:84</code> identifier was introduced in WMS 1.3.0 to explicitly declare lon/lat order without ambiguity.</div>';
            }

            // Layer names
            html += '<div class="section"><div class="section-head"><h2><i class="fas fa-list"></i> Layer Names</h2><div class="section-actions"><input type="text" class="search-input" id="layerSearch" placeholder="Filter layers..." aria-label="Filter layers"><button class="btn-sm" id="copyAllBtn"><i class="fas fa-copy"></i> Copy All</button></div></div>';
            html += '<div class="layer-count-bar" id="layerCountBar">Showing ' + flatLayers.length + ' layers</div>';
            html += '<div class="layer-list" id="layerList">';
            for (var i = 0; i < flatLayers.length; i++) {
                html += '<div class="layer-item" data-name="' + esc(flatLayers[i].name) + '" title="Click to copy"><span class="idx">' + (i + 1) + '</span><span class="name">' + esc(flatLayers[i].name) + '</span><span class="copy-hint"><i class="fas fa-clipboard"></i></span></div>';
            }
            html += '</div></div>';

            // Layer tree
            html += '<div class="section"><div class="section-head"><h2><i class="fas fa-sitemap"></i> Layer Tree</h2><div class="section-actions"><button class="btn-sm" id="expandAllBtn"><i class="fas fa-expand-alt"></i> Expand</button><button class="btn-sm" id="collapseAllBtn"><i class="fas fa-compress-alt"></i> Collapse</button></div></div>';
            html += '<div class="layer-tree" id="layerTree"></div></div>';

            // CRS list
            html += '<div class="section"><div class="section-head"><h2><i class="fas fa-globe"></i> Supported ' + (isV13 ? 'CRS' : 'SRS') + '</h2><div class="section-actions"><button class="btn-sm" id="copyCrsBtn"><i class="fas fa-copy"></i> Copy All</button></div></div>';
            html += '<div class="crs-list">';
            for (var ci = 0; ci < allCrs.length; ci++) {
                var crs = allCrs[ci];
                var hl = (crs === 'EPSG:4326' || crs === 'CRS:84');
                var desc = CRS_INFO[crs] || '';
                html += '<div class="crs-item"><span class="crs-badge ' + (hl ? 'highlight' : 'normal') + '">' + esc(crs) + '</span>' + (desc ? '<span class="crs-desc">' + esc(desc) + '</span>' : '') + '</div>';
            }
            html += '</div></div>';

            // Raw XML
            var truncated = rawXml.length > 80000;
            var displayXml = truncated ? rawXml.substring(0, 80000) + '\n\n... (truncated)' : rawXml;
            var sizeLabel = (rawXml.length / 1024).toFixed(rawXml.length > 10240 ? 0 : 1) + ' KB';
            html += '<div class="section"><div class="section-head"><h2><i class="fas fa-code"></i> Raw GetCapabilities XML</h2><div class="section-actions">' + (truncated ? '<span style="font-size:11px;color:var(--text-muted);margin-right:6px">Truncated — ' + sizeLabel + ' total</span>' : '<span style="font-size:11px;color:var(--text-muted);margin-right:6px">' + sizeLabel + '</span>') + '<button class="btn-sm" id="toggleRawBtn"><i class="fas fa-chevron-down"></i> Show</button></div></div>';
            html += '<pre class="raw-xml hidden" id="rawXml">' + esc(displayXml) + '</pre></div>';

            area.innerHTML = html;
            area.classList.remove('hidden');

            // Wire up layer search
            var searchInput = document.getElementById('layerSearch');
            var layerList = document.getElementById('layerList');
            var countBar = document.getElementById('layerCountBar');
            searchInput.addEventListener('input', function() {
                var q = searchInput.value.toLowerCase();
                var vis = 0;
                var items = layerList.querySelectorAll('.layer-item');
                for (var j = 0; j < items.length; j++) {
                    var match = items[j].getAttribute('data-name').toLowerCase().indexOf(q) !== -1;
                    items[j].style.display = match ? '' : 'none';
                    if (match) vis++;
                }
                countBar.textContent = 'Showing ' + vis + ' of ' + flatLayers.length + ' layers';
            });

            // Copy single layer
            var layerItems = layerList.querySelectorAll('.layer-item');
            for (var li = 0; li < layerItems.length; li++) {
                (function(item) {
                    item.addEventListener('click', function() {
                        navigator.clipboard.writeText(item.getAttribute('data-name')).then(function() {
                            toast('Copied: ' + item.getAttribute('data-name'), 'success');
                        }).catch(function() { toast('Copy failed', 'error'); });
                    });
                })(layerItems[li]);
            }

            // Copy all layers
            document.getElementById('copyAllBtn').addEventListener('click', function() {
                var names = flatLayers.map(function(l) { return l.name; }).join(',');
                navigator.clipboard.writeText(names).then(function() {
                    toast('Copied ' + flatLayers.length + ' layer names', 'success');
                }).catch(function() { toast('Copy failed', 'error'); });
            });

            // Copy CRS
            document.getElementById('copyCrsBtn').addEventListener('click', function() {
                navigator.clipboard.writeText(allCrs.join(', ')).then(function() {
                    toast('Copied ' + allCrs.length + ' CRS values', 'success');
                }).catch(function() { toast('Copy failed', 'error'); });
            });

            // Build tree
            buildTreeDOM(layerTree, document.getElementById('layerTree'));

            // Expand / Collapse
            document.getElementById('expandAllBtn').addEventListener('click', function() {
                var els = document.querySelectorAll('#layerTree .tree-children');
                for (var e = 0; e < els.length; e++) els[e].classList.remove('collapsed');
                var toggles = document.querySelectorAll('#layerTree .tree-toggle');
                for (var f = 0; f < toggles.length; f++) toggles[f].classList.remove('collapsed');
            });
            document.getElementById('collapseAllBtn').addEventListener('click', function() {
                var els = document.querySelectorAll('#layerTree .tree-children');
                for (var e = 0; e < els.length; e++) els[e].classList.add('collapsed');
                var toggles = document.querySelectorAll('#layerTree .tree-toggle:not(.hidden-toggle)');
                for (var f = 0; f < toggles.length; f++) toggles[f].classList.add('collapsed');
            });

            // Toggle raw XML
            document.getElementById('toggleRawBtn').addEventListener('click', function() {
                var pre = document.getElementById('rawXml');
                var btn = document.getElementById('toggleRawBtn');
                var isHidden = pre.classList.contains('hidden');
                pre.classList.toggle('hidden');
                btn.innerHTML = isHidden ? '<i class="fas fa-chevron-up"></i> Hide' : '<i class="fas fa-chevron-down"></i> Show';
            });
        }

        /* ===== Build tree DOM ===== */
        function buildTreeDOM(node, container) {
            var hasChildren = node.children && node.children.length > 0;
            var isLeaf = !!node.name;
            var isFolder = !isLeaf && hasChildren;

            var row = document.createElement('div');
            row.className = 'tree-row';

            var toggle = document.createElement('span');
            toggle.className = 'tree-toggle' + ((hasChildren || isFolder) ? '' : ' hidden-toggle');
            if (hasChildren) toggle.textContent = '\u25BC';
            row.appendChild(toggle);

            var icon = document.createElement('span');
            icon.className = 'tree-icon ' + (isLeaf ? 'leaf' : 'folder');
            icon.innerHTML = isLeaf ? '<i class="fas fa-layer-group"></i>' : '<i class="fas fa-folder"></i>';
            row.appendChild(icon);

            var nameSpan = document.createElement('span');
            nameSpan.className = 'tree-name' + (isFolder ? ' folder-name' : '');
            nameSpan.textContent = isLeaf ? node.name : (node.title || node.name || 'Root');
            nameSpan.title = isLeaf ? node.name : (node.title || '');
            row.appendChild(nameSpan);

            if (isLeaf) {
                row.style.cursor = 'pointer';
                row.title = 'Click to copy layer name';
                row.addEventListener('click', function() {
                    navigator.clipboard.writeText(node.name).then(function() {
                        toast('Copied: ' + node.name, 'success');
                    });
                });
            }

            container.appendChild(row);

            if (hasChildren) {
                var childContainer = document.createElement('div');
                childContainer.className = 'tree-children';

                toggle.style.cursor = 'pointer';
                toggle.addEventListener('click', function(e) {
                    e.stopPropagation();
                    childContainer.classList.toggle('collapsed');
                    toggle.classList.toggle('collapsed');
                });

                row.addEventListener('click', function(e) {
                    if (e.target.closest('.tree-name.leaf')) return;
                    childContainer.classList.toggle('collapsed');
                    toggle.classList.toggle('collapsed');
                });

                for (var i = 0; i < node.children.length; i++) {
                    buildTreeDOM(node.children[i], childContainer);
                }
                container.appendChild(childContainer);
            }
        }

        /* ===== Events ===== */
        document.getElementById('decodeBtn').addEventListener('click', decodeWMS);
        document.getElementById('wmsUrl').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') decodeWMS();
        });
    </script>
</body>
</html>
